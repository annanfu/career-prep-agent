<!DOCTYPE html>
<html lang="en" class="h-full bg-stone-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Career Prep Agent{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body class="h-full font-sans text-stone-700 antialiased" hx-boost="true">

  <!-- Navbar -->
  <nav class="bg-white border-b border-stone-200">
    <div class="max-w-6xl mx-auto px-6">
      <div class="flex items-center justify-between h-14">
        <span class="text-stone-800 text-sm font-semibold">Career Prep Agent</span>
        <div class="flex gap-1">
          <a href="/"
             class="px-3 py-1.5 rounded-lg text-sm font-medium transition
                    {% if active_tab == 'tailor' %}bg-teal-50 text-teal-700{% else %}text-stone-500 hover:text-stone-700 hover:bg-stone-50{% endif %}">
            Resume Tailoring
          </a>
          <a href="/tracker"
             class="px-3 py-1.5 rounded-lg text-sm font-medium transition
                    {% if active_tab == 'tracker' %}bg-teal-50 text-teal-700{% else %}text-stone-500 hover:text-stone-700 hover:bg-stone-50{% endif %}">
            Application Tracker
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main layout -->
  <div class="max-w-6xl mx-auto px-6 py-6">
    <div class="flex gap-6">
      {% block sidebar %}{% endblock %}
      <main class="flex-1 min-w-0">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  <!-- Chat panel -->
  <div id="chat-panel" class="fixed bottom-0 right-6 w-[400px] z-40 transition-all duration-300">
    <button onclick="toggleChat()"
            class="w-full bg-teal-600 hover:bg-teal-700 text-white px-4 py-3
                   rounded-t-xl flex items-center justify-between
                   transition text-sm font-medium shadow-lg">
      <span>Chat Assistant</span>
      <svg id="chat-chevron" class="w-4 h-4 transition-transform duration-300 text-teal-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>
      </svg>
    </button>
    <div id="chat-body" class="hidden bg-white border border-t-0 border-stone-200 shadow-xl rounded-b-xl"
         style="height: 420px;">
      {% include "partials/chat_panel.html" %}
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
