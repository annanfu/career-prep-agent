{% if error %}
<p class="text-sm text-stone-400">{{ error }}</p>
{% elif stats %}
<details class="text-sm">
  <summary class="cursor-pointer text-stone-500 hover:text-stone-700 font-medium">
    ChromaDB: {{ total_chunks }} chunks, {{ num_files }} files
  </summary>
  <div class="mt-2 space-y-1">
    {% for item in stats %}
    <div class="flex justify-between text-stone-400">
      <span class="truncate mr-2">{{ item.file }}</span>
      <span>{{ item.chunks }}</span>
    </div>
    {% endfor %}
  </div>
</details>
{% else %}
<p class="text-sm text-stone-400">ChromaDB not initialized yet.</p>
{% endif %}
